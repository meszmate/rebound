name: Release

# Build and publish signed ZXPs to GitHub Releases when a version tag is pushed.
#
#   git tag v0.1.0    # must match "version" in package.json
#   git push origin v0.1.0
#
# A CEP extension must be signed by Adobe's ZXPSignCmd, and a ZXP signed on one
# OS renders BLANK on the other (a documented Adobe issue), so we build and sign
# separately on macOS and Windows and attach both. Each signer binary is fetched
# from Adobe's own CEP-Resources repo, pinned to a commit and checked by SHA-256.
# Users download the file for their OS and install it with any ZXP installer.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {} # run manually against a v* tag ref (or from main to rebuild the current version)

permissions:
  contents: write

jobs:
  prepare:
    name: Gate & create the release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Never ship a release that fails the suite.
      - run: npm run lint
      - run: npm test
      - name: Resolve version and tag
        id: v
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="v$VERSION"
          else
            TAG="$GITHUB_REF_NAME"
            if [ "$TAG" != "v$VERSION" ]; then
              echo "::error::Tag '$TAG' does not match package.json version 'v$VERSION'."
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Ensure the release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.v.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Rebound $TAG" --generate-notes
          fi

  build:
    name: Build & sign (${{ matrix.name }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            suffix: macos
            signer_url: https://raw.githubusercontent.com/Adobe-CEP/CEP-Resources/45667fc2953688ea4dec45361e5e5efb80f30211/ZXPSignCMD/4.1.3/macOS/ZXPSignCmd
            signer_sha256: bc773fae0b97416fc7a462e7dadcc00270428a9913480c9b78b5606ff1cfb095
          - name: Windows
            os: windows-latest
            suffix: windows
            signer_url: https://raw.githubusercontent.com/Adobe-CEP/CEP-Resources/45667fc2953688ea4dec45361e5e5efb80f30211/ZXPSignCMD/4.1.3/x64/ZXPSignCmd.exe
            signer_sha256: ffc2223167225ce61d024eb463fc5ad1a1be16133f99ef334a646f7311916c98
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Ensure Rosetta 2 (macOS runner runs the x86_64 signer)
        if: runner.os == 'macOS'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Fetch and verify Adobe ZXPSignCmd
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Windows" ]; then SIGNER="$PWD/zxpsigncmd.exe"; else SIGNER="$PWD/zxpsigncmd"; fi
          curl -fsSL "${{ matrix.signer_url }}" -o "$SIGNER"
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "${{ matrix.signer_sha256 }}  $SIGNER" | shasum -a 256 -c -
          else
            echo "${{ matrix.signer_sha256 }}  $SIGNER" | sha256sum -c -
          fi
          chmod +x "$SIGNER" || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "REBOUND_ZXPSIGN=$(cygpath -w "$SIGNER")" >> "$GITHUB_ENV"
          else
            echo "REBOUND_ZXPSIGN=$SIGNER" >> "$GITHUB_ENV"
          fi

      - name: Package the signed ZXP
        env:
          REBOUND_CERT_PASSWORD: ${{ secrets.REBOUND_CERT_PASSWORD }}
          REBOUND_TSA: ${{ vars.REBOUND_TSA || 'http://timestamp.digicert.com' }}
          REBOUND_ZXP_SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          node tools/make-cert.mjs
          node tools/pack.mjs
          ls -lh "dist/rebound_${{ needs.prepare.outputs.version }}_${{ matrix.suffix }}.zxp"

      - name: Upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "dist/rebound_${{ needs.prepare.outputs.version }}_${{ matrix.suffix }}.zxp" --clobber
