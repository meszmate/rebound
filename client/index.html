<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rebound</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/context-home.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/preset-gallery.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/tooltip.css" />
  <link rel="stylesheet" href="css/gradient-editor.css" />
  <link rel="stylesheet" href="css/palette.css" />
  <link rel="stylesheet" href="css/curve-editor.css" />
  <link rel="stylesheet" href="css/preview.css" />
  <link rel="stylesheet" href="css/demo.css" />
  <link rel="stylesheet" href="css/import.css" />
</head>
<body>
  <div id="rb-app"></div>
  <div id="rb-toasts"></div>

  <!--
    Buildless: classic scripts loaded in dependency order. Each attaches to the
    global Rebound namespace. Adding a feature = create its file and add one
    <script> line in the "Features" block below.
  -->

  <!-- Vendored -->
  <script src="js/lib/CSInterface.js"></script>

  <!-- Core -->
  <script src="js/core/log.js"></script>
  <script src="js/core/events.js"></script>
  <script src="js/core/dom.js"></script>
  <script src="js/core/brand.js"></script>
  <script src="js/core/units.js"></script>
  <script src="js/core/bridge.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/core/store.js"></script>
  <script src="js/core/registry.js"></script>
  <script src="js/core/keybinds.js"></script>

  <!-- Cross-app import: loopback receiver (the host validates IR authoritatively;
       panel-side validation is vendored in a later phase). -->
  <script src="js/core/ingest-server.js"></script>

  <!-- Easing engine -->
  <script src="js/easing/bezier.js"></script>
  <script src="js/easing/penner.js"></script>
  <script src="js/easing/spring.js"></script>
  <script src="js/easing/overshoot.js"></script>
  <script src="js/easing/speedgraph.js"></script>
  <script src="js/easing/sampler.js"></script>
  <script src="js/easing/apply.js"></script>

  <!-- Exporters -->
  <script src="js/export/lottie.js"></script>

  <!-- Audio analysis -->
  <script src="js/audio/onset.js"></script>

  <!-- Motion behaviors -->
  <script src="js/behaviors/library.js"></script>

  <!-- Presets -->
  <script src="js/presets/defaults.js"></script>

  <!-- UI -->
  <script src="js/ui/controls.js"></script>
  <script src="js/ui/color-picker.js"></script>
  <script src="js/ui/preset-gallery.js"></script>
  <script src="js/ui/modal.js"></script>
  <script src="js/ui/tooltip.js"></script>
  <script src="js/ui/curve-editor.js"></script>
  <script src="js/ui/curve-chip.js"></script>
  <script src="js/ui/gradient-editor.js"></script>
  <script src="js/ui/selection-context.js"></script>
  <script src="js/ui/context-home.js"></script>
  <script src="js/ui/preview-stage.js"></script>
  <script src="js/ui/tool-meta.js"></script>
  <script src="js/ui/tool-demos.js"></script>
  <script src="js/ui/tool-demos-extra.js"></script>
  <script src="js/ui/tool-demos-overrides.js"></script>
  <script src="js/ui/tool-presets.js"></script>
  <script src="js/ui/home-actions.js"></script>
  <script src="js/ui/appearance.js"></script>
  <script src="js/ui/home-screen.js"></script>
  <script src="js/ui/code-editor.js"></script>

  <!-- Features (one line per tool) -->
  <script src="js/features/ease.js"></script>
  <script src="js/features/library.js"></script>
  <script src="js/features/spring.js"></script>
  <script src="js/features/anchor.js"></script>
  <script src="js/features/align.js"></script>
  <script src="js/features/recoil.js"></script>
  <script src="js/features/drift.js"></script>
  <script src="js/features/bounce.js"></script>
  <script src="js/features/multiply.js"></script>
  <script src="js/features/radial.js"></script>
  <script src="js/features/flip.js"></script>
  <script src="js/features/stagger.js"></script>
  <script src="js/features/trim.js"></script>
  <script src="js/features/arrange.js"></script>
  <script src="js/features/keys.js"></script>
  <script src="js/features/motion.js"></script>
  <script src="js/features/follow.js"></script>
  <script src="js/features/comp.js"></script>
  <script src="js/features/fade.js"></script>
  <script src="js/features/trimpaths.js"></script>
  <script src="js/features/shapes.js"></script>
  <script src="js/features/grids.js"></script>
  <script src="js/features/color.js"></script>
  <script src="js/features/vignette.js"></script>
  <script src="js/features/reset.js"></script>
  <script src="js/features/echo.js"></script>
  <script src="js/features/sequence.js"></script>
  <script src="js/features/smooth.js"></script>
  <script src="js/features/nullify.js"></script>
  <script src="js/features/lean.js"></script>
  <script src="js/features/tags.js"></script>
  <script src="js/features/precompose.js"></script>
  <script src="js/features/velocity.js"></script>
  <script src="js/features/copyease.js"></script>
  <script src="js/features/retime.js"></script>
  <script src="js/features/clone.js"></script>
  <script src="js/features/expressions.js"></script>
  <script src="js/features/autocrop.js"></script>
  <script src="js/features/scatter.js"></script>
  <script src="js/features/share.js"></script>
  <script src="js/features/bake.js"></script>
  <script src="js/features/kinetic.js"></script>
  <script src="js/features/separate.js"></script>
  <script src="js/features/break.js"></script>
  <script src="js/features/palette.js"></script>
  <script src="js/features/reverse.js"></script>
  <script src="js/features/demo.js"></script>
  <script src="js/features/link.js"></script>
  <script src="js/features/stroke.js"></script>
  <script src="js/features/textbreak.js"></script>
  <script src="js/features/gradient.js"></script>
  <script src="js/features/scripts.js"></script>
  <script src="js/features/rename.js"></script>
  <script src="js/features/squash.js"></script>
  <script src="js/features/throw.js"></script>
  <script src="js/features/pathfollow.js"></script>
  <script src="js/features/pins.js"></script>
  <script src="js/features/pinrig.js"></script>
  <script src="js/features/backdrop.js"></script>
  <script src="js/features/import.js"></script>
  <script src="js/features/lottie.js"></script>
  <script src="js/features/audio.js"></script>
  <script src="js/features/behaviors.js"></script>
  <script src="js/features/settings-panel.js"></script>

  <!-- Boot last -->
  <script src="js/main.js"></script>
</body>
</html>
